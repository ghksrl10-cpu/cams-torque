<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>범퍼 조립 토크 측정</title>
<style>
  :root{
    --bd:#b9c0cc; --hd:#e9edf3; --hd2:#dfe5ee; --blue:#1d4ed8;
    --ok:#15803d; --okbg:#dcfce7; --ng:#b91c1c; --ngbg:#fee2e2; --mut:#6b7280;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"맑은 고딕","Malgun Gothic",system-ui,sans-serif;background:#f3f4f6;color:#111;font-size:15px}
  .wrap{max-width:1400px;margin:0 auto;padding:10px 10px 60px}
  h1{font-size:20px;margin:6px 0 12px;display:flex;align-items:center;gap:8px}
  h1::before{content:"■";color:#111}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tab{flex:1;padding:12px;border:1px solid var(--bd);background:#fff;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer;text-align:center;color:#374151}
  .tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#fff;border:1px solid var(--bd);border-radius:10px;padding:10px;margin-bottom:10px}
  .bar label{font-weight:700;color:#374151}
  .bar input,.bar select{padding:8px;border:1px solid var(--bd);border-radius:8px;font-size:15px}
  .date-in{width:64px;text-align:center}
  .grow{flex:1}
  .btn{padding:9px 14px;border:1px solid var(--bd);border-radius:8px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#374151}
  .btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
  .hint{font-size:13px;color:var(--mut);margin:2px 0 10px;line-height:1.5}
  .sec{background:#fff;border:1px solid var(--bd);border-radius:10px;margin-bottom:12px;overflow:hidden}
  .sec-h{background:var(--hd);padding:8px 12px;font-weight:800;font-size:16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
  .sec-h .stat{font-size:13px;font-weight:600;color:var(--mut)}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;min-width:760px}
  th,td{border:1px solid var(--bd);padding:0;text-align:center;height:46px}
  .rowlab{background:var(--hd2);font-weight:700;width:62px;position:sticky;left:0;z-index:2}
  th{background:var(--hd2);font-weight:700;font-size:15px}
  td input{width:100%;height:100%;border:0;text-align:center;font-size:15px;background:transparent;outline:none}
  td input:focus{background:#eef4ff}
  .meas-in{font-weight:700;font-size:16px}
  td.has{background:#fff}
  td.off{background:#f1f3f6} td.off input{background:#f1f3f6}
  td.ok{background:var(--okbg)} td.ok .meas-in{color:var(--ok)}
  td.ng{background:var(--ngbg)} td.ng .meas-in{color:var(--ng)}
  .unit{font-size:12px;color:var(--mut)}
  .save-note{font-size:13px;color:var(--mut)} .save-note b{color:var(--ok)}
  /* 사진 */
  .photos{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
  .ph{position:relative}
  .ph img{width:130px;height:98px;object-fit:cover;border:1px solid var(--bd);border-radius:8px;cursor:pointer}
  .ph .del{position:absolute;top:-7px;right:-7px;background:#fff;border:1px solid var(--bd);border-radius:50%;width:24px;height:24px;cursor:pointer;font-weight:700;color:var(--ng)}
  .filelab{display:inline-block}
  /* 이력 모달 */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;align-items:flex-start;justify-content:center;padding:18px;overflow:auto}
  .modal-box{background:#fff;border-radius:12px;max-width:1200px;width:100%;padding:14px}
  .modal-head{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;margin-bottom:10px}
  .hist-line{font-weight:800;margin:14px 0 6px;color:var(--blue);font-size:16px}
  .hist-item{display:flex;align-items:center;gap:8px;padding:13px;border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer}
  .hist-item:hover{background:#eef4ff}
  .rep-head{font-size:16px;font-weight:700;margin:10px 0}
  .rep-sec{margin-bottom:10px}
  .rep-sech{background:var(--hd);font-weight:800;padding:6px 10px;border:1px solid var(--bd);border-bottom:0}
  .rep-area td.ok{background:var(--okbg);color:var(--ok);font-weight:700}
  .rep-area td.ng{background:var(--ngbg);color:var(--ng);font-weight:700}
  .rep-tools{display:flex;gap:8px;margin-bottom:10px}
  #overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;text-align:center;font-size:17px;font-weight:700;color:#374151;z-index:80;padding:20px;line-height:1.6}
  @media (max-width:560px){ body{font-size:14px} h1{font-size:17px} }
  @media print{
    body *{visibility:hidden}
    #repArea,#repArea *{visibility:visible}
    #repArea{position:absolute;left:0;top:0;width:100%}
    .rep-tools,.btn{display:none}
    table{min-width:0!important}
  }
</style>
</head>
<body>
<div id="overlay">불러오는 중…</div>
<div class="wrap">
  <h1 id="title">범퍼 조립 토크 측정</h1>

  <div class="tabs">
    <div class="tab active" data-line="1LINE" onclick="switchLine('1LINE')">◎ 조립 1LINE</div>
    <div class="tab" data-line="2LINE" onclick="switchLine('2LINE')">◎ 조립 2LINE</div>
  </div>

  <div class="bar">
    <label>측정일</label>
    <input class="date-in" id="dy" type="number" inputmode="numeric"> 년
    <input class="date-in" id="dm" type="number" inputmode="numeric"> 월
    <input class="date-in" id="dd" type="number" inputmode="numeric"> 일
    <span class="grow"></span>
    <label>기록</label>
    <select id="recSel" onchange="loadRecord(this.value)"></select>
    <button class="btn" onclick="newRecord()">＋ 새 기록</button>
  </div>
  <div class="bar">
    <button class="btn pri" onclick="saveNow()">💾 저장</button>
    <button class="btn" onclick="reloadFromServer()">🔄 새로고침</button>
    <button class="btn" onclick="openHistory()">📋 이력 보기</button>
    <button class="btn" onclick="exportCSV()">엑셀(CSV)</button>
    <span class="grow"></span>
    <span class="save-note" id="saveNote"></span>
  </div>
  <div class="hint">
    · <b>기준값</b>을 직접 고치세요(예: 13~20). 비우면 그 위치는 측정 안 함(회색).<br>
    · <b>실측</b>엔 숫자만. kgf 자동. 기준 안=초록(OK), 벗어남=빨강(NG).<br>
    · 입력·사진은 <b>클라우드에 자동 저장</b>됩니다. 폰·PC 어디서 열어도 같은 데이터. 다른 기기 입력은 🔄새로고침으로 반영.
  </div>

  <div id="sections"></div>
</div>

<!-- 이력 보기 모달 -->
<div id="histModal" class="modal">
  <div class="modal-box">
    <div class="modal-head">📋 측정 이력 <span class="grow"></span>
      <button class="btn" onclick="closeHistory()">닫기 ✕</button></div>
    <div id="histList"></div>
    <div id="histDetail"></div>
  </div>
</div>

<!-- ===== Firebase (구글 무료 클라우드) ===== -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>

<script>
const COLS = ['101','102','103','111','121','131','141','151','161','171','181','191'];
const SUBCOLS = ['서브1','서브2','서브3','서브4'];
const DEFAULT_BASE = {
  '1LINE':{
    FRT:{'103':'13~20','111':'13~20','121':'13~20','131':'13~20','141':'13~20','151':'13~20'},
    SUB:{'서브1':'20~25'},
    RR :{'102':'13~20','111':'13~20','121':'13~20','131':'13~20','161':'13~20'}
  },
  '2LINE':{
    FRT:{'102':'13~20','103':'35~51','111':'13~20','121':'13~20','141':'13~20','151':'13~20','171':'13~20'},
    SUB:{'서브1':'13~20'},
    RR :{'102':'13~20','103':'13~20','111':'35~51','131':'13~20','141':'13~20','171':'13~20'}
  }
};
const SECTIONS = [
  {key:'FRT', label:'FRT', cols:COLS},
  {key:'SUB', label:'서브', cols:SUBCOLS},
  {key:'RR',  label:'RR',  cols:COLS},
];

let curLine='1LINE', curRecId='', DB={'1LINE':{records:{}},'2LINE':{records:{}}};
let db=null;

/* ===== Firebase 초기화 ===== */
function fbInit(){
  if(firebaseConfig.apiKey.indexOf('여기에')===0){
    showOverlay('⚠️ Firebase 설정이 비어 있습니다.<br>index.html 위쪽 firebaseConfig 에<br>본인 설정을 붙여넣고 다시 올려주세요.<br>(설치방법.txt 참고)');
    return false;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    return true;
  }catch(e){ showOverlay('Firebase 연결 오류:<br>'+e.message); return false; }
}
function showOverlay(html){ const o=document.getElementById('overlay'); o.innerHTML=html; o.style.display='flex'; }
function hideOverlay(){ document.getElementById('overlay').style.display='none'; }

async function loadAll(){
  const snap = await db.collection('records').get();
  DB={'1LINE':{records:{}},'2LINE':{records:{}}};
  snap.forEach(d=>{
    const v=d.data(); if(!DB[v.line]) return;
    DB[v.line].records[v.ym]={
      date:v.date||{y:'',m:'',d:''},
      base:v.base||{FRT:{},SUB:{},RR:{}},
      meas:v.meas||{FRT:{},SUB:{},RR:{}},
      photos:v.photos||[]
    };
  });
}
async function saveRecord(line,id){
  const rec=DB[line].records[id]; if(!rec||!db) return;
  await db.collection('records').doc(line+'_'+id).set({
    line, ym:id, date:rec.date, base:rec.base, meas:rec.meas, photos:rec.photos||[],
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

/* ===== 자동 저장(디바운스) ===== */
let saveTimer=null, saving=false, dirty=false;
function note(html){ document.getElementById('saveNote').innerHTML=html; }
function persist(){ dirty=true; note('저장 대기…'); if(saveTimer)clearTimeout(saveTimer); saveTimer=setTimeout(flush,800); }
async function flush(){
  if(!dirty||saving||!curRecId) return; saving=true; dirty=false; note('저장 중…');
  try{ await saveRecord(curLine,curRecId); const t=new Date(); note('<b>저장됨</b> · '+t.getHours()+':'+String(t.getMinutes()).padStart(2,'0')); }
  catch(e){ dirty=true; note('저장 실패 — 재시도'); if(saveTimer)clearTimeout(saveTimer); saveTimer=setTimeout(flush,2000); }
  saving=false; if(dirty){ if(saveTimer)clearTimeout(saveTimer); saveTimer=setTimeout(flush,800); }
}

/* ===== 기록 ===== */
function blankRecord(line){ return { date:{y:'',m:'',d:''}, base:JSON.parse(JSON.stringify(DEFAULT_BASE[line])), meas:{FRT:{},SUB:{},RR:{}}, photos:[] }; }
function latestRecord(line){ const ids=Object.keys(DB[line].records).sort(); return ids.length?DB[line].records[ids[ids.length-1]]:null; }

function switchLine(line){
  curLine=line;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.line===line));
  refreshRecSelect();
  const ids=Object.keys(DB[line].records).sort();
  if(ids.length) loadRecord(ids[ids.length-1]); else newRecord(true);
}
function refreshRecSelect(){
  const sel=document.getElementById('recSel');
  const ids=Object.keys(DB[curLine].records).sort().reverse();
  sel.innerHTML=ids.map(id=>`<option value="${id}">${id.replace('-','년 ')}월</option>`).join('')||'<option value="">(기록 없음)</option>';
}
function newRecord(silent){
  const t=new Date(); let y=t.getFullYear(), m=t.getMonth()+1;
  if(!silent){
    const inp=prompt('새 기록 (년-월)  예: '+y+'-'+String(m).padStart(2,'0'), y+'-'+String(m).padStart(2,'0'));
    if(!inp) return;
    const mt=inp.match(/(\d{4})\D+(\d{1,2})/); if(!mt){alert('형식: 2025-01');return;}
    y=+mt[1]; m=+mt[2];
  }
  const id=y+'-'+String(m).padStart(2,'0');
  if(!DB[curLine].records[id]){
    const rec=blankRecord(curLine); const prev=latestRecord(curLine);
    if(prev) rec.base=JSON.parse(JSON.stringify(prev.base));
    rec.date={y:String(y),m:String(m),d:''}; DB[curLine].records[id]=rec;
    curRecId=id; persist();
  }
  refreshRecSelect(); loadRecord(id);
}
function loadRecord(id){
  if(!id||!DB[curLine].records[id]) return;
  curRecId=id; document.getElementById('recSel').value=id;
  const rec=DB[curLine].records[id];
  document.getElementById('dy').value=rec.date.y||id.split('-')[0];
  document.getElementById('dm').value=rec.date.m||(+id.split('-')[1]);
  document.getElementById('dd').value=rec.date.d||'';
  render();
}
function cur(){ return DB[curLine].records[curRecId]; }

/* ===== 렌더링 ===== */
function render(){
  document.getElementById('title').textContent=((document.getElementById('dy').value||'')+'').slice(2)+'년 범퍼 조립 토크 측정';
  const rec=cur(); if(!rec) return;
  const root=document.getElementById('sections'); root.innerHTML='';
  SECTIONS.forEach(sec=>{
    let cols=sec.cols;
    if(sec.key==='SUB'){ cols=SUBCOLS.filter(c=>rec.base.SUB[c]!==undefined); if(!cols.length)cols=['서브1']; }
    let okc=0,ngc=0,cnt=0;
    const cells=cols.map(c=>{
      const base=rec.base[sec.key][c]??'', meas=rec.meas[sec.key][c]??'';
      const st=judge(base,meas); if(base!=='')cnt++; if(st==='ok')okc++; if(st==='ng')ngc++;
      return {c,base,meas,cls:base===''?'off':(st||'has')};
    });
    const div=document.createElement('div'); div.className='sec';
    div.innerHTML=`
      <div class="sec-h">${sec.label}<span class="stat">기준 ${cnt}곳 · OK ${okc} · NG ${ngc}</span></div>
      <div class="scroll"><table>
        <tr><td class="rowlab">구분</td>${cells.map(x=>`<th>${x.c}</th>`).join('')}</tr>
        <tr><td class="rowlab">기준값</td>${cells.map(x=>`<td class="${x.cls}"><input data-sec="${sec.key}" data-col="${x.c}" value="${x.base}" placeholder="13~20" onchange="onBase(this)"></td>`).join('')}</tr>
        <tr><td class="rowlab">실측</td>${cells.map(x=>`<td class="${x.cls}"><input class="meas-in" data-sec="${sec.key}" data-col="${x.c}" type="number" inputmode="decimal" value="${x.meas}" ${x.base===''?'disabled':''} onchange="onMeas(this)"></td>`).join('')}</tr>
      </table></div>`;
    root.appendChild(div);
  });
  // 사진 카드
  const pc=document.createElement('div'); pc.className='sec';
  const photos=rec.photos||[];
  pc.innerHTML=`<div class="sec-h">📷 사진 <span class="stat">측정 사진 첨부 (${photos.length}장)</span></div>
    <div style="padding:12px">
      <label class="btn pri filelab">＋ 사진 촬영 / 추가
        <input type="file" accept="image/*" capture="environment" style="display:none" onchange="addPhoto(this)"></label>
      <div class="photos">${photos.map((p,i)=>`<div class="ph"><img src="${p.url}" onclick="window.open('${p.url}','_blank')"><div class="del" onclick="delPhoto(${i})">✕</div></div>`).join('')}</div>
    </div>`;
  root.appendChild(pc);
}
function judge(base,meas){
  if(base===''||meas===''||meas===null) return '';
  const m=String(base).replace(/kgf/gi,'').match(/(-?\d+(?:\.\d+)?)\s*[~\-]\s*(-?\d+(?:\.\d+)?)/);
  const v=parseFloat(meas); if(isNaN(v)) return '';
  if(!m){ const s=parseFloat(String(base)); return isNaN(s)?'':(v===s?'ok':'ng'); }
  const lo=Math.min(+m[1],+m[2]), hi=Math.max(+m[1],+m[2]); return (v>=lo&&v<=hi)?'ok':'ng';
}
function onBase(el){ const r=cur(),v=el.value.trim(); if(v==='')delete r.base[el.dataset.sec][el.dataset.col]; else r.base[el.dataset.sec][el.dataset.col]=v; persist(); render(); }
function onMeas(el){ const r=cur(),v=el.value.trim(); if(v==='')delete r.meas[el.dataset.sec][el.dataset.col]; else r.meas[el.dataset.sec][el.dataset.col]=v; persist(); render(); }
['dy','dm','dd'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{
  const r=cur(); if(!r)return; r.date={y:document.getElementById('dy').value,m:document.getElementById('dm').value,d:document.getElementById('dd').value}; persist(); if(id==='dy')render();
}));

async function saveNow(){ if(saveTimer)clearTimeout(saveTimer); await flush(); alert('저장되었습니다.'); }
async function reloadFromServer(){
  showOverlay('새로고침 중…');
  try{ await loadAll(); switchLine(curLine); }catch(e){ alert('불러오기 실패: '+e.message); }
  hideOverlay();
}

/* ===== 사진 (압축해서 Firestore에 저장 — 결제수단 불필요) ===== */
function compressImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>=h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg', quality));
      };
      img.onerror=reject; img.src=reader.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
async function addPhoto(input){
  const f=input.files[0]; if(!f) return;
  const rec=cur(); if(!rec){ input.value=''; return; }
  rec.photos=rec.photos||[];
  if(rec.photos.length>=8){ alert('사진은 한 기록(월)에 최대 8장까지 넣을 수 있어요.'); input.value=''; return; }
  note('사진 처리 중…');
  try{
    const dataUrl=await compressImage(f, 1024, 0.55);
    rec.photos.push({url:dataUrl, name:f.name});
    const total=rec.photos.reduce((s,p)=>s+(p.url?p.url.length:0),0);
    if(total>900000){ rec.photos.pop(); alert('사진 용량이 가득 찼습니다.\n기존 사진을 지우고 추가하거나, 다음 달 기록으로 나눠 담으세요.'); note(''); input.value=''; return; }
    await saveRecord(curLine,curRecId);
    note('<b>사진 추가됨</b>'); render();
  }catch(e){ alert('사진 처리 실패: '+e.message); note(''); }
  input.value='';
}
async function delPhoto(i){
  const rec=cur(); if(!rec||!rec.photos[i]) return;
  if(!confirm('이 사진을 삭제할까요?')) return;
  rec.photos.splice(i,1); await saveRecord(curLine,curRecId); render();
}

/* ===== 이력 보기 ===== */
function countRec(rec){
  let ok=0,ng=0,cnt=0;
  SECTIONS.forEach(s=>Object.keys(rec.base[s.key]||{}).forEach(c=>{
    cnt++; const st=judge(rec.base[s.key][c],rec.meas[s.key][c]); if(st==='ok')ok++; if(st==='ng')ng++;
  }));
  return {ok,ng,cnt};
}
function openHistory(){
  let html='';
  ['1LINE','2LINE'].forEach(line=>{
    const ids=Object.keys(DB[line].records).sort().reverse();
    if(!ids.length) return;
    html+=`<div class="hist-line">◎ 조립 ${line}</div>`;
    ids.forEach(id=>{
      const rec=DB[line].records[id], n=countRec(rec), np=(rec.photos||[]).length;
      html+=`<div class="hist-item" onclick="viewRecord('${line}','${id}')">
        <b>${id.replace('-','년 ')}월</b>
        <span class="unit">측정일 ${rec.date.m||'-'}/${rec.date.d||'-'}</span>
        <span class="grow"></span>
        <span style="color:var(--ok)">OK ${n.ok}</span> / <span style="color:var(--ng)">NG ${n.ng}</span>
        <span class="unit">(기준 ${n.cnt}곳${np?' · 📷'+np:''})</span> ›</div>`;
    });
  });
  document.getElementById('histList').innerHTML = html || '<div class="hint">아직 저장된 기록이 없습니다.</div>';
  document.getElementById('histDetail').innerHTML='';
  document.getElementById('histList').style.display='block';
  document.getElementById('histModal').style.display='flex';
}
function viewRecord(line,id){
  document.getElementById('histList').style.display='none';
  document.getElementById('histDetail').innerHTML=
    `<div class="rep-tools">
       <button class="btn" onclick="backToList()">‹ 목록</button>
       <button class="btn pri" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
     </div>
     <div id="repArea" class="rep-area">${buildStatic(line,id)}</div>`;
}
function backToList(){ document.getElementById('histDetail').innerHTML=''; document.getElementById('histList').style.display='block'; }
function closeHistory(){ document.getElementById('histModal').style.display='none'; }
function buildStatic(line,id){
  const rec=DB[line].records[id]; if(!rec) return '';
  let html=`<div class="rep-head">■ ${(rec.date.y||id.split('-')[0]).toString().slice(2)}년 범퍼 조립 토크 측정 · 조립 ${line}<br>
    측정일 : ${rec.date.y||id.split('-')[0]}년 ${rec.date.m||(+id.split('-')[1])}월 ${rec.date.d||''}일 &nbsp;<span class="unit">(단위: kgf)</span></div>`;
  SECTIONS.forEach(sec=>{
    const cols=sec.cols.filter(c=>rec.base[sec.key][c]!==undefined);
    if(!cols.length) return;
    const cells=cols.map(c=>{ const base=rec.base[sec.key][c]||'', meas=rec.meas[sec.key][c]??'', st=judge(base,meas); return {c,base,meas,st}; });
    html+=`<div class="rep-sec"><div class="rep-sech">${sec.label}</div><div class="scroll"><table>
      <tr><td class="rowlab">구분</td>${cells.map(x=>`<th>${x.c}</th>`).join('')}</tr>
      <tr><td class="rowlab">기준값</td>${cells.map(x=>`<td>${x.base?x.base+' <span class="unit">kgf</span>':''}</td>`).join('')}</tr>
      <tr><td class="rowlab">실측</td>${cells.map(x=>`<td class="${x.st}">${x.meas!==''?x.meas+' <span class="unit">kgf</span>':''}</td>`).join('')}</tr>
      <tr><td class="rowlab">판정</td>${cells.map(x=>`<td class="${x.st}">${x.st==='ok'?'OK':x.st==='ng'?'NG':''}</td>`).join('')}</tr>
    </table></div></div>`;
  });
  const photos=rec.photos||[];
  if(photos.length){
    html+=`<div class="rep-sec"><div class="rep-sech">📷 사진</div><div class="photos" style="padding:8px">
      ${photos.map(p=>`<div class="ph"><img src="${p.url}" onclick="window.open('${p.url}','_blank')"></div>`).join('')}</div></div>`;
  }
  return html;
}

/* ===== CSV ===== */
function exportCSV(){
  const rec=cur(); if(!rec){alert('기록 없음');return;}
  let rows=[['라인',curLine],['측정일',`${rec.date.y}-${rec.date.m}-${rec.date.d}`],['단위','kgf'],[]];
  SECTIONS.forEach(sec=>{
    const cols=sec.cols.filter(c=>rec.base[sec.key][c]!==undefined); if(!cols.length)return;
    rows.push([sec.label]); rows.push(['구분',...cols]);
    rows.push(['기준값(kgf)',...cols.map(c=>rec.base[sec.key][c]||'')]);
    rows.push(['실측(kgf)',...cols.map(c=>rec.meas[sec.key][c]||'')]);
    rows.push(['판정',...cols.map(c=>{const s=judge(rec.base[sec.key][c],rec.meas[sec.key][c]);return s==='ok'?'OK':s==='ng'?'NG':'';})]);
    rows.push([]);
  });
  const csv='﻿'+rows.map(r=>r.map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const b=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download=`토크측정_${curLine}_${curRecId}.csv`; a.click();
}

(async function init(){
  if(!fbInit()) return;
  try{ await loadAll(); }catch(e){ showOverlay('데이터 불러오기 실패:<br>'+e.message+'<br><br>Firestore가 켜져 있는지 확인하세요.'); return; }
  switchLine('1LINE');
  hideOverlay();
})();
</script>
